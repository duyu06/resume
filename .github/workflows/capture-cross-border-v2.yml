name: Capture enhanced demo screenshots

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - .github/workflows/capture-cross-border-v2.yml
      - public/demos/incremental-enrich.css
      - public/demos/incremental-enrich.js
      - public/demos/ai-ecommerce/**
      - public/demos/digitalhuman/**
      - public/demos/rpa/**
      - public/demos/cross-border/**
      - public/demos/webui/**
      - public/demos/soulcaller/**

permissions:
  contents: write

concurrency:
  group: capture-enhanced-demos
  cancel-in-progress: true

jobs:
  capture:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Wait for GitHub Pages deployment
        shell: bash
        run: |
          set -euo pipefail
          base="https://duyu06.github.io/resume/demos"
          for attempt in $(seq 1 60); do
            ai="$(curl -fsSL --retry 2 --connect-timeout 10 "$base/ai-ecommerce/?capture=${GITHUB_SHA}" || true)"
            digital="$(curl -fsSL --retry 2 --connect-timeout 10 "$base/digitalhuman/?capture=${GITHUB_SHA}" || true)"
            rpa="$(curl -fsSL --retry 2 --connect-timeout 10 "$base/rpa/?capture=${GITHUB_SHA}" || true)"
            cross="$(curl -fsSL --retry 2 --connect-timeout 10 "$base/cross-border/?capture=${GITHUB_SHA}" || true)"
            webui="$(curl -fsSL --retry 2 --connect-timeout 10 "$base/webui/?capture=${GITHUB_SHA}" || true)"
            soul="$(curl -fsSL --retry 2 --connect-timeout 10 "$base/soulcaller/?capture=${GITHUB_SHA}" || true)"
            if grep -q "incremental-enrich.js" <<<"$ai" \
              && grep -q "incremental-enrich.js" <<<"$digital" \
              && grep -q "incremental-enrich.js" <<<"$rpa" \
              && grep -q "YOLA" <<<"$cross" \
              && grep -q "incremental-enrich.js" <<<"$webui" \
              && grep -q "incremental-enrich.js" <<<"$soul"; then
              echo "All enhanced demos are live."
              exit 0
            fi
            echo "Waiting for Pages deployment (${attempt}/60)..."
            sleep 10
          done
          echo "Latest demo pages were not deployed in time." >&2
          exit 1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Chromium renderer
        shell: bash
        run: |
          npm install --no-save playwright@1.55.0
          npx playwright install --with-deps chromium

      - name: Capture live project screenshots
        shell: bash
        run: |
          node <<'NODE'
          const { chromium } = require('playwright');
          const fs = require('node:fs');

          const demos = [
            { slug: 'ai-ecommerce', a: 'proj-02-a.png', b: 'proj-02-b.png', marker: '#root > *', enriched: true },
            { slug: 'cross-border', a: 'proj-03-a.png', b: 'proj-03-b.png', marker: '.hero-sticky', target: '#collection' },
            { slug: 'digitalhuman', a: 'proj-04-a.png', b: 'proj-04-b.png', marker: '#main-content.visible', target: '#stats-section', enriched: true },
            { slug: 'webui', a: 'proj-05-a.png', b: 'proj-05-b.png', marker: '#root > *', enriched: true },
            { slug: 'soulcaller', a: 'proj-06-a.png', b: 'proj-06-b.png', marker: '#root > *', enriched: true },
            { slug: 'rpa', a: 'proj-07-a.png', b: 'proj-07-b.png', marker: '#root > *', enriched: true },
          ];

          async function settle(page, demo) {
            await page.waitForSelector(demo.marker, { timeout: 45000 });
            if (demo.enriched) {
              await page.waitForSelector('.motion-enrich-status', { timeout: 15000 });
            }
            await page.evaluate(async () => {
              if (document.fonts?.ready) await document.fonts.ready;
              const images = [...document.images];
              await Promise.all(images.map((img) => {
                if (img.complete) return Promise.resolve();
                return new Promise((resolve) => {
                  const done = () => resolve();
                  img.addEventListener('load', done, { once: true });
                  img.addEventListener('error', done, { once: true });
                  setTimeout(done, 15000);
                });
              }));
            });
            await page.waitForTimeout(2600);
          }

          async function secondState(page, demo) {
            if (demo.target) {
              await page.locator(demo.target).scrollIntoViewIfNeeded();
              await page.waitForTimeout(1600);
              return;
            }

            const patterns = {
              'ai-ecommerce': /生成|开始|立即|generate/i,
              'webui': /部署|启动|deploy|start/i,
              'soulcaller': /开始|进入|start|continue/i,
              'rpa': /运行|启动|run|start/i,
            };
            const pattern = patterns[demo.slug];
            if (pattern) {
              const button = page.getByRole('button', { name: pattern }).first();
              try {
                if (await button.count()) {
                  await button.click({ timeout: 3000 });
                  await page.waitForTimeout(1200);
                }
              } catch {}
            }
            await page.evaluate(() => {
              const max = Math.max(0, document.documentElement.scrollHeight - innerHeight);
              scrollTo({ top: max * 0.48, behavior: 'instant' });
            });
            await page.waitForTimeout(1000);
          }

          (async () => {
            fs.mkdirSync('public/assets/projects', { recursive: true });
            const browser = await chromium.launch({ headless: true });

            for (const demo of demos) {
              const context = await browser.newContext({
                viewport: { width: 1440, height: 900 },
                deviceScaleFactor: 1,
                locale: 'zh-CN',
                colorScheme: 'dark',
                reducedMotion: 'no-preference',
              });
              const page = await context.newPage();
              await page.goto(`https://duyu06.github.io/resume/demos/${demo.slug}/?capture=${Date.now()}`, {
                waitUntil: 'domcontentloaded',
                timeout: 120000,
              });
              await settle(page, demo);
              await page.screenshot({
                path: `public/assets/projects/${demo.a}`,
                type: 'png',
                animations: 'disabled',
              });
              await secondState(page, demo);
              await page.screenshot({
                path: `public/assets/projects/${demo.b}`,
                type: 'png',
                animations: 'disabled',
              });
              await context.close();
            }

            await browser.close();
          })().catch((error) => {
            console.error(error);
            process.exit(1);
          });
          NODE

      - name: Commit refreshed project screenshots
        shell: bash
        run: |
          set -euo pipefail
          files=(
            public/assets/projects/proj-02-a.png public/assets/projects/proj-02-b.png
            public/assets/projects/proj-03-a.png public/assets/projects/proj-03-b.png
            public/assets/projects/proj-04-a.png public/assets/projects/proj-04-b.png
            public/assets/projects/proj-05-a.png public/assets/projects/proj-05-b.png
            public/assets/projects/proj-06-a.png public/assets/projects/proj-06-b.png
            public/assets/projects/proj-07-a.png public/assets/projects/proj-07-b.png
          )
          if git diff --quiet -- "${files[@]}"; then
            echo "Screenshots are unchanged."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "${files[@]}"
          git commit -m "chore: refresh incrementally enhanced demo screenshots"
          git push origin HEAD:main