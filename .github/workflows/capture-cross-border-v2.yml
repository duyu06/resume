name: Capture cross-border screenshots v4

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - public/demos/cross-border/**

permissions:
  contents: write

concurrency:
  group: capture-cross-border
  cancel-in-progress: true

jobs:
  capture:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Wait for GitHub Pages deployment
        shell: bash
        run: |
          set -euo pipefail
          url="https://duyu06.github.io/resume/demos/cross-border/?capture=${GITHUB_SHA}"
          for attempt in $(seq 1 36); do
            html="$(curl -fsSL --retry 2 --connect-timeout 10 "$url" || true)"
            if grep -q "Blue Nile" <<<"$html" && grep -q "hero-section" <<<"$html"; then
              echo "Blue Nile storefront is live."
              exit 0
            fi
            echo "Waiting for Pages deployment (${attempt}/36)..."
            sleep 10
          done
          echo "Latest cross-border page was not deployed in time." >&2
          exit 1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Chromium renderer
        shell: bash
        run: |
          npm install --no-save playwright@1.55.0
          npx playwright install --with-deps chromium

      - name: Capture live responsive screenshots
        shell: bash
        run: |
          node <<'NODE'
          const { chromium } = require('playwright');
          const fs = require('node:fs');

          async function waitForAssets(page) {
            await page.waitForSelector('.hero-section', { timeout: 45000 });
            await page.waitForSelector('.hero-image-wrapper img', { timeout: 45000 });
            await page.evaluate(async () => {
              if (document.fonts?.ready) await document.fonts.ready;
              const images = [...document.images];
              await Promise.all(images.map((img) => {
                if (img.complete) return Promise.resolve();
                return new Promise((resolve) => {
                  const done = () => resolve();
                  img.addEventListener('load', done, { once: true });
                  img.addEventListener('error', done, { once: true });
                  setTimeout(done, 20000);
                });
              }));
            });
            await page.waitForTimeout(1800);
          }

          (async () => {
            const browser = await chromium.launch({ headless: true });
            fs.mkdirSync('public/assets/projects', { recursive: true });
            const url = `https://duyu06.github.io/resume/demos/cross-border/?capture=${Date.now()}`;

            const desktop = await browser.newContext({
              viewport: { width: 1440, height: 900 },
              deviceScaleFactor: 1,
              locale: 'en-US',
              colorScheme: 'light',
            });
            const desktopPage = await desktop.newPage();
            await desktopPage.goto(url, { waitUntil: 'domcontentloaded', timeout: 120000 });
            await waitForAssets(desktopPage);
            await desktopPage.screenshot({
              path: 'public/assets/projects/proj-03-a.png',
              type: 'png',
              animations: 'disabled',
            });
            await desktop.close();

            const responsive = await browser.newContext({
              viewport: { width: 1000, height: 750 },
              deviceScaleFactor: 1,
              locale: 'en-US',
              colorScheme: 'light',
            });
            const responsivePage = await responsive.newPage();
            await responsivePage.goto(url, { waitUntil: 'domcontentloaded', timeout: 120000 });
            await waitForAssets(responsivePage);
            await responsivePage.screenshot({
              path: 'public/assets/projects/proj-03-b.png',
              type: 'png',
              animations: 'disabled',
            });
            await responsive.close();

            await browser.close();
          })().catch((error) => {
            console.error(error);
            process.exit(1);
          });
          NODE

      - name: Commit refreshed project screenshots
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet -- public/assets/projects/proj-03-a.png public/assets/projects/proj-03-b.png; then
            echo "Screenshots are unchanged."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/assets/projects/proj-03-a.png public/assets/projects/proj-03-b.png
          git commit -m "chore: refresh Blue Nile project screenshots"
          git push origin HEAD:main
