name: Capture cross-border screenshots

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - .github/workflows/capture-cross-border.yml
      - public/demos/cross-border/**

permissions:
  contents: write

concurrency:
  group: capture-cross-border
  cancel-in-progress: true

jobs:
  capture:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Wait for GitHub Pages deployment
        shell: bash
        run: |
          set -euo pipefail
          url="https://duyu06.github.io/resume/demos/cross-border/?capture=${GITHUB_SHA}"
          for attempt in $(seq 1 36); do
            html="$(curl -fsSL --retry 2 --connect-timeout 10 "$url" || true)"
            if grep -q "cross-border.css" <<<"$html" && grep -q "MEASURED" <<<"$html"; then
              echo "Latest cross-border page is available."
              exit 0
            fi
            echo "Waiting for Pages deployment (${attempt}/36)..."
            sleep 10
          done
          echo "GitHub Pages did not expose the latest cross-border build in time." >&2
          exit 1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Chromium renderer
        shell: bash
        run: |
          npm install --no-save playwright@1.55.0
          npx playwright install --with-deps chromium

      - name: Capture live desktop screenshots
        shell: bash
        run: |
          node <<'NODE'
          const { chromium } = require('playwright');
          const fs = require('node:fs');

          (async () => {
            const browser = await chromium.launch({ headless: true });
            const context = await browser.newContext({
              viewport: { width: 1440, height: 900 },
              deviceScaleFactor: 1,
              locale: 'zh-CN',
              colorScheme: 'light',
              reducedMotion: 'no-preference',
            });
            const page = await context.newPage();
            const url = `https://duyu06.github.io/resume/demos/cross-border/?capture=${Date.now()}`;

            await page.goto(url, { waitUntil: 'domcontentloaded', timeout: 120000 });
            await page.waitForSelector('.hero-title', { timeout: 30000 });
            await page.evaluate(async () => {
              if (document.fonts?.ready) await document.fonts.ready;
            });

            try {
              await page.waitForSelector('.hero-video.is-ready', { timeout: 20000 });
            } catch {
              // The poster remains visible when the video CDN is slow.
            }
            await page.waitForTimeout(1800);

            fs.mkdirSync('public/assets/projects', { recursive: true });
            await page.screenshot({
              path: 'public/assets/projects/proj-03-a.png',
              type: 'png',
              animations: 'disabled',
            });

            await page.locator('#about').scrollIntoViewIfNeeded();
            await page.waitForTimeout(1500);
            await page.screenshot({
              path: 'public/assets/projects/proj-03-b.png',
              type: 'png',
              animations: 'disabled',
            });

            await browser.close();
          })().catch((error) => {
            console.error(error);
            process.exit(1);
          });
          NODE

      - name: Commit refreshed project screenshots
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet -- public/assets/projects/proj-03-a.png public/assets/projects/proj-03-b.png; then
            echo "Screenshots are unchanged."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/assets/projects/proj-03-a.png public/assets/projects/proj-03-b.png
          git commit -m "chore: refresh cross-border project screenshots [skip ci]"
          git push origin HEAD:main
