name: Build and Deploy GitHub Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          VITE_MAXKB_EMBED_URL: ${{ vars.MAXKB_EMBED_URL }}

      - name: Install Chromium smoke-test runtime
        run: |
          npm install --no-save playwright
          npx playwright install --with-deps chromium

      - name: Start preview server
        run: |
          npm run preview -- --host 127.0.0.1 > /tmp/resume-preview.log 2>&1 &
          for attempt in {1..30}; do
            if curl --fail --silent http://127.0.0.1:4173/resume/ >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          cat /tmp/resume-preview.log
          exit 1

      - name: Test integrated demos on desktop and mobile
        run: node scripts/upstream-demo-smoke.mjs
        env:
          TEST_BASE_URL: http://127.0.0.1:4173/resume

      - name: Verify deployed integrated demos
        if: github.event_name == 'pull_request'
        run: |
          ready=0
          for attempt in {1..30}; do
            prism=$(curl --fail --silent --location https://duyu06.github.io/resume/demos/ai-ecommerce/ || true)
            digital=$(curl --fail --silent --location https://duyu06.github.io/resume/demos/digitalhuman/ || true)
            rpa=$(curl --fail --silent --location https://duyu06.github.io/resume/demos/rpa/ || true)
            if grep -q 'PRISMPIX ADAPTER' <<< "$prism" \
              && grep -q 'TALK-TO-FENGGE-LIVE ADAPTER' <<< "$digital" \
              && grep -q 'WEBRPA COMPATIBLE WORKFLOW STUDIO' <<< "$rpa"; then
              ready=1
              break
            fi
            sleep 10
          done
          if [ "$ready" -ne 1 ]; then
            echo 'Deployed pages did not expose the integrated demo markers in time.'
            exit 1
          fi
          rm -rf test-results/upstream-demo-screenshots
          node scripts/upstream-demo-smoke.mjs
        env:
          TEST_BASE_URL: https://duyu06.github.io/resume

      - name: Upload integrated demo screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: upstream-demo-dual-device-screenshots
          path: test-results/upstream-demo-screenshots
          if-no-files-found: ignore
          retention-days: 14

      - uses: actions/configure-pages@v4
        if: github.event_name != 'pull_request'
      - uses: actions/upload-pages-artifact@v3
        if: github.event_name != 'pull_request'
        with:
          path: dist

  deploy:
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
