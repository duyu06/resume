<svg xmlns="http://www.w3.org/2000/svg" width="1414" height="1000" viewBox="0 0 1414 1000" role="img" aria-labelledby="title desc">
  <title id="title">AI 客服数字人工作台</title>
  <desc id="desc">展示数字人客服、客户信息、对话、订单查询、退款、工具轨迹和服务指标的深色绿色工作台。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#06100e"/><stop offset="1" stop-color="#0d211b"/></linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#122b23"/><stop offset="1" stop-color="#091612"/></linearGradient>
    <radialGradient id="glow"><stop stop-color="#5fe6a0" stop-opacity=".3"/><stop offset="1" stop-color="#5fe6a0" stop-opacity="0"/></radialGradient>
    <filter id="shadow"><feDropShadow dx="0" dy="24" stdDeviation="30" flood-color="#000" flood-opacity=".35"/></filter>
    <pattern id="grid" width="52" height="52" patternUnits="userSpaceOnUse"><path d="M52 0H0V52" fill="none" stroke="#5fe6a0" stroke-opacity=".045"/></pattern>
  </defs>
  <rect width="1414" height="1000" fill="url(#bg)"/>
  <rect width="1414" height="1000" fill="url(#grid)"/>
  <circle cx="240" cy="210" r="300" fill="url(#glow)"/>
  <circle cx="1260" cy="850" r="360" fill="url(#glow)" opacity=".35"/>

  <g transform="translate(70 62)">
    <text x="0" y="30" fill="#5fe6a0" font-family="Arial,sans-serif" font-size="18" letter-spacing="5">AI CUSTOMER SERVICE · DIGITAL HUMAN</text>
    <text x="0" y="92" fill="#f2fff9" font-family="Arial,sans-serif" font-size="50" font-weight="700">AI 客服数字人 Agent</text>
    <text x="0" y="130" fill="#8ea79d" font-family="Arial,sans-serif" font-size="20">订单查询 · 库存核验 · 退款闭环 · 情绪识别 · 人工转接</text>
  </g>

  <g transform="translate(70 230)" filter="url(#shadow)">
    <rect width="330" height="690" rx="30" fill="url(#panel)" stroke="#24453b"/>
    <text x="28" y="48" fill="#5fe6a0" font-family="Arial,sans-serif" font-size="14" letter-spacing="3">DIGITAL HUMAN</text>
    <text x="28" y="86" fill="#f2fff9" font-family="Arial,sans-serif" font-size="28" font-weight="700">客服 Agent 在线</text>
    <g transform="translate(55 130)">
      <circle cx="110" cy="120" r="108" fill="#5fe6a0" fill-opacity=".09" stroke="#5fe6a0" stroke-opacity=".35"/>
      <ellipse cx="110" cy="116" rx="64" ry="82" fill="#bd8876"/>
      <path d="M44 82C52 18 166 12 178 84c-30-27-98-39-134-2Z" fill="#18231f"/>
      <circle cx="86" cy="112" r="5" fill="#241b18"/><circle cx="134" cy="112" r="5" fill="#241b18"/>
      <path d="M95 151c10 7 20 7 30 0" fill="none" stroke="#58362f" stroke-width="3" stroke-linecap="round"/>
      <g fill="#5fe6a0"><rect x="202" y="90" width="5" height="18" rx="3"/><rect x="214" y="80" width="5" height="38" rx="3"/><rect x="226" y="68" width="5" height="62" rx="3"/><rect x="238" y="84" width="5" height="30" rx="3"/></g>
    </g>
    <g transform="translate(28 405)">
      <rect width="274" height="76" rx="16" fill="#07110e" stroke="#24453b"/>
      <circle cx="32" cy="38" r="10" fill="#5fe6a0"/><text x="54" y="34" fill="#f2fff9" font-family="Arial,sans-serif" font-size="16" font-weight="700">林晓雨 · Gold</text><text x="54" y="55" fill="#8ea79d" font-family="Arial,sans-serif" font-size="13">CUST-001 · Web · 中文</text>
      <g transform="translate(0 96)" font-family="Arial,sans-serif">
        <rect width="132" height="68" rx="14" fill="#07110e" stroke="#24453b"/><text x="16" y="27" fill="#5fe6a0" font-size="12">ORDER</text><text x="16" y="49" fill="#8ea79d" font-size="13">物流查询</text>
        <rect x="142" width="132" height="68" rx="14" fill="#07110e" stroke="#24453b"/><text x="158" y="27" fill="#5fe6a0" font-size="12">REFUND</text><text x="158" y="49" fill="#8ea79d" font-size="13">退款提交</text>
        <rect y="78" width="132" height="68" rx="14" fill="#07110e" stroke="#24453b"/><text x="16" y="105" fill="#5fe6a0" font-size="12">STOCK</text><text x="16" y="127" fill="#8ea79d" font-size="13">库存核验</text>
        <rect x="142" y="78" width="132" height="68" rx="14" fill="#07110e" stroke="#24453b"/><text x="158" y="105" fill="#5fe6a0" font-size="12">HANDOFF</text><text x="158" y="127" fill="#8ea79d" font-size="13">人工转接</text>
      </g>
    </g>
  </g>

  <g transform="translate(425 230)" filter="url(#shadow)">
    <rect width="920" height="690" rx="30" fill="#091612" stroke="#24453b"/>
    <g transform="translate(26 24)" font-family="Arial,sans-serif">
      <text x="0" y="18" fill="#5fe6a0" font-size="13" letter-spacing="3">LIVE SUPPORT WORKSPACE</text>
      <text x="0" y="54" fill="#f2fff9" font-size="28" font-weight="700">AI 客服工作台</text>
      <g transform="translate(0 80)">
        <g><rect width="205" height="74" rx="16" fill="#10231d" stroke="#24453b"/><text x="16" y="26" fill="#8ea79d" font-size="12">当前客户</text><text x="16" y="53" fill="#f2fff9" font-size="21" font-weight="700">CUST-001</text></g>
        <g transform="translate(217)"><rect width="205" height="74" rx="16" fill="#10231d" stroke="#24453b"/><text x="16" y="26" fill="#8ea79d" font-size="12">情绪状态</text><text x="16" y="53" fill="#f5bd62" font-size="21" font-weight="700">中性</text></g>
        <g transform="translate(434)"><rect width="205" height="74" rx="16" fill="#10231d" stroke="#24453b"/><text x="16" y="26" fill="#8ea79d" font-size="12">工具调用</text><text x="16" y="53" fill="#5fe6a0" font-size="21" font-weight="700">04</text></g>
        <g transform="translate(651)"><rect width="205" height="74" rx="16" fill="#10231d" stroke="#24453b"/><text x="16" y="26" fill="#8ea79d" font-size="12">本轮消息</text><text x="16" y="53" fill="#f2fff9" font-size="21" font-weight="700">08</text></g>
      </g>
    </g>

    <g transform="translate(26 196)" font-family="Arial,sans-serif">
      <rect width="548" height="456" rx="20" fill="#10231d" stroke="#24453b"/>
      <g transform="translate(20 22)"><circle cx="8" cy="8" r="8" fill="#5fe6a0"/><text x="28" y="14" fill="#f2fff9" font-size="15" font-weight="700">AI 客服数字人</text><text x="372" y="14" fill="#8ea79d" font-size="12">问题已处理</text></g>
      <line x1="0" y1="58" x2="548" y2="58" stroke="#24453b"/>
      <g transform="translate(22 86)">
        <rect x="170" width="330" height="68" rx="18" fill="#5fe6a0"/><text x="190" y="27" fill="#062117" font-size="15">帮我查询订单 ORD-12345</text><text x="190" y="50" fill="#184d37" font-size="11">CUST-001 · 10:24:18</text>
        <rect y="92" width="455" height="100" rx="18" fill="#0b1815" stroke="#24453b"/><text x="20" y="124" fill="#f2fff9" font-size="15">订单已发出，当前到达广州分拨中心。</text><text x="20" y="151" fill="#f2fff9" font-size="15">预计明天下午送达，单号 SF13800138000。</text><text x="20" y="176" fill="#8ea79d" font-size="11">本地演示 Agent</text>
        <rect x="144" y="222" width="356" height="68" rx="18" fill="#5fe6a0"/><text x="166" y="250" fill="#062117" font-size="15">确认商品未拆封，正式提交退款</text><text x="166" y="273" fill="#184d37" font-size="11">CUST-001 · 10:25:01</text>
        <rect y="314" width="470" height="84" rx="18" fill="#0b1815" stroke="#24453b"/><text x="20" y="346" fill="#f2fff9" font-size="15">退款已正式提交，预计 1–3 个工作日到账。</text><text x="20" y="374" fill="#8ea79d" font-size="11">confirm_refund · success</text>
      </g>
    </g>

    <g transform="translate(594 196)" font-family="Arial,sans-serif">
      <rect width="300" height="456" rx="20" fill="#10231d" stroke="#24453b"/>
      <text x="18" y="34" fill="#5fe6a0" font-size="11" letter-spacing="2">TOOL TRACE</text><text x="18" y="61" fill="#f2fff9" font-size="18" font-weight="700">Agent 工具调用</text>
      <g transform="translate(18 84)">
        <rect width="264" height="68" rx="13" fill="#07110e" stroke="#24453b"/><text x="14" y="27" fill="#5fe6a0" font-size="13" font-weight="700">confirm_refund</text><text x="14" y="49" fill="#8ea79d" font-size="11">正式提交 · 1–3 个工作日</text>
        <rect y="80" width="264" height="68" rx="13" fill="#07110e" stroke="#24453b"/><text x="14" y="107" fill="#5fe6a0" font-size="13" font-weight="700">process_refund</text><text x="14" y="129" fill="#8ea79d" font-size="11">资格核验 · 等待确认</text>
        <rect y="160" width="264" height="68" rx="13" fill="#07110e" stroke="#24453b"/><text x="14" y="187" fill="#5fe6a0" font-size="13" font-weight="700">lookup_order</text><text x="14" y="209" fill="#8ea79d" font-size="11">物流状态 · 顺丰</text>
        <text x="0" y="263" fill="#5fe6a0" font-size="11" letter-spacing="2">SENTIMENT</text>
        <rect y="280" width="264" height="9" rx="5" fill="#07110e"/><rect y="280" width="155" height="9" rx="5" fill="#f5bd62"/>
        <text x="0" y="320" fill="#f2fff9" font-size="14" font-weight="700">neutral · 0.00</text><text x="0" y="347" fill="#8ea79d" font-size="11">当前无需人工接管</text>
      </g>
    </g>
  </g>
</svg>
